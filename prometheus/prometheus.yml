global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "flask-app"
    static_configs:
      - targets: ["flask-app:5000"]

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
